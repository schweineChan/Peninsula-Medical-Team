<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#06122f">
  <title>Peninsula Medical Team｜半岛医疗课件主页</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06122f;
      --card: rgba(9, 27, 69, .82);
      --line: rgba(138, 184, 255, .22);
      --text: #f7fbff;
      --muted: #b9c7df;
      --blue: #19a8ff;
      --yellow: #ecff00;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 78% 14%, rgba(46, 132, 255, .42), transparent 32rem),
        radial-gradient(circle at 18% 72%, rgba(236, 255, 0, .15), transparent 26rem),
        linear-gradient(145deg, #031028 0%, #07163a 52%, #020817 100%);
    }

    main {
      width: min(1120px, calc(100% - 40px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr minmax(320px, 520px);
      align-items: center;
      gap: 42px;
      padding: 56px 0;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--yellow);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 82px);
      line-height: .98;
      letter-spacing: -.06em;
    }

    h1 span {
      display: block;
      margin-top: 10px;
      color: var(--blue);
      letter-spacing: .08em;
      font-size: .42em;
    }

    .lead {
      margin: 28px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: clamp(18px, 2.2vw, 24px);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    a {
      color: inherit;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid var(--line);
      text-decoration: none;
      font-weight: 800;
      background: rgba(255, 255, 255, .06);
      box-shadow: 0 18px 44px rgba(0, 0, 0, .2);
    }

    .button.primary {
      color: #00122d;
      border: 0;
      background: linear-gradient(135deg, var(--yellow), #76edff);
    }

    .course-card {
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      background: var(--card);
      box-shadow: 0 30px 80px rgba(0, 0, 0, .34);
    }

    .course-card img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #08183e;
    }

    .course-card div {
      padding: 22px;
    }

    .course-card h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .course-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
      padding: 0;
      list-style: none;
    }

    .meta li {
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, .05);
      font-size: 13px;
    }

    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <p class="eyebrow">Peninsula Medical Team</p>
      <h1>半岛医疗课件主页 <span>Interactive Courseware</span></h1>
      <p class="lead">这里收纳医学部分享课件。当前上线课程：半岛大超炮「维韧（WITHIN）打法」交互课件。</p>
      <div class="actions">
        <a class="button primary" href="./within-course/">打开维韧打法课件 →</a>
        <a class="button" href="https://github.com/schweineChan/Peninsula-Medical-Team">查看 GitHub 仓库</a>
      </div>
      <ul class="meta" aria-label="课程信息">
        <li>15 分钟分享</li>
        <li>医学部双周会</li>
        <li>支持全屏 / 备注 / 计时</li>
      </ul>
    </section>

    <a class="course-card" href="./within-course/" aria-label="打开维韧打法交互课件">
      <img src="./within-course/preview.png" alt="维韧打法交互课件预览">
      <div>
        <h2>维韧（WITHIN）打法</h2>
        <p>从影像先行、识别靶层、精准锁定，到分层治疗、整合决策与自然年轻。</p>
      </div>
    </a>
  </main>
</body>
</html>
